# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Prepare Vulkan SDK
      uses: humbletim/setup-vulkan-sdk@v1.2.1
      with:
        vulkan-query-version: 1.4.304.1
        vulkan-components: Vulkan-Headers, Vulkan-Loader
        vulkan-use-cache: true

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xorg-dev

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Get project name
      id: project
      shell: bash
      run: |
        name=$(grep -m1 'project(' CMakeLists.txt | sed 's/project(\([^)]*\))/\1/')
        echo "name=$name" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Create AppImage
      if: runner.os == 'Linux' && matrix.c_compiler == 'gcc'
      run: |
        PROJECT=${{ steps.project.outputs.name }}
        # Generate .desktop file
        cat > /tmp/${PROJECT}.desktop << DESKTOP
        [Desktop Entry]
        Name=${PROJECT}
        Exec=${PROJECT}
        Icon=${PROJECT,,}
        Type=Application
        Categories=Graphics;
        DESKTOP

        # Download linuxdeploy
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage

        # Create AppDir
        mkdir -p AppDir/usr/bin
        cp ${{ steps.strings.outputs.build-output-dir }}/${PROJECT} AppDir/usr/bin/

        # Build AppImage
        APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --desktop-file /tmp/${PROJECT}.desktop \
          --icon-file .github/packaging/${PROJECT,,}.svg \
          --output appimage

    - name: Upload AppImage
      if: runner.os == 'Linux' && matrix.c_compiler == 'gcc'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.project.outputs.name }}-Linux
        path: "*.AppImage"

    - name: Create macOS app bundle
      if: runner.os == 'macOS'
      shell: bash
      run: |
        PROJECT=${{ steps.project.outputs.name }}
        APP="${PROJECT}.app"
        mkdir -p "${APP}/Contents/MacOS" "${APP}/Contents/Resources"

        cp ${{ steps.strings.outputs.build-output-dir }}/${PROJECT} "${APP}/Contents/MacOS/"

        # Copy shared libraries
        for lib in ${{ steps.strings.outputs.build-output-dir }}/_deps/sdl-build/libSDL3*.dylib; do
          [ -f "$lib" ] && cp "$lib" "${APP}/Contents/MacOS/"
        done

        # Fix library paths
        install_name_tool -add_rpath @executable_path "${APP}/Contents/MacOS/${PROJECT}" 2>/dev/null || true

        cat > "${APP}/Contents/Info.plist" << PLIST
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>CFBundleExecutable</key>
          <string>${PROJECT}</string>
          <key>CFBundleIdentifier</key>
          <string>com.${PROJECT,,}.app</string>
          <key>CFBundleName</key>
          <string>${PROJECT}</string>
          <key>CFBundleVersion</key>
          <string>1.0</string>
          <key>CFBundlePackageType</key>
          <string>APPL</string>
        </dict>
        </plist>
        PLIST

        # Create a zip to preserve executable permissions
        zip -r "${PROJECT}-macOS.zip" "${APP}"

    - name: Upload macOS app
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.project.outputs.name }}-macOS
        path: "*.zip"

    - name: Upload Windows executable
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.project.outputs.name }}-Windows
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/Release/*.exe
          ${{ steps.strings.outputs.build-output-dir }}/Release/*.dll
